version: "3.9"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: earlyeyes_postgres
    environment:
      POSTGRES_USER: earlyeyes
      POSTGRES_PASSWORD: earlyeyes123
      POSTGRES_DB: earlyeyes_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U earlyeyes"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (for job queue + token blacklist)
  redis:
    image: redis:7-alpine
    container_name: earlyeyes_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: